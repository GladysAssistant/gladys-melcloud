# -----------------------------------------------------------------------------
# Build & publish the multi-architecture image.
#
# Triggers:
#   - a Git version tag (e.g. `v1.2.0`): the publication path. The image is
#     tagged `<version>` + `latest` and picked up by the decentralized indexer
#     (no review, no account to create).
#   - manual run (workflow_dispatch) from any branch: the testing path. The
#     image is tagged `test-<branch>` (or the `tag` input) and NEVER `latest`,
#     so a manual test can not be mistaken for a release.
#
# Result: an image pushed to the GitHub Container Registry (ghcr.io), for
# linux/amd64 AND linux/arm64 (Raspberry Pi, etc.).
# -----------------------------------------------------------------------------
name: Build and publish image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (default: test-<branch>)'
        required: false
        default: ''
      push:
        description: 'Push the image to ghcr.io'
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tag
        id: meta
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual test build: `tag` input, or the branch name (sanitized:
            # a Docker tag only allows [a-zA-Z0-9._-]).
            version="${INPUT_TAG:-test-${GITHUB_REF_NAME//[^a-zA-Z0-9._-]/-}}"
            echo "latest=false" >> "$GITHUB_OUTPUT"
          else
            # v1.2.0 -> 1.2.0
            version="${GITHUB_REF_NAME#v}"
            echo "latest=true" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          # Manual runs can build without pushing by unchecking the input.
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.push }}
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.latest == 'true' && format('{0}:latest', steps.meta.outputs.image) || '' }}
